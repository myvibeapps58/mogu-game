<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>もぐらたたきゲーム</title>

<style>

body {
    margin: 0;
    font-family: "Yu Gothic UI", sans-serif;
    text-align: center;
    background: #a8df9f;
}

h1 {
    margin-top: 25px;
    font-size: 38px;
}

.info {
    display: flex;
    justify-content: center;
    gap: 70px;
    font-size: 24px;
    font-weight: bold;
}

#message {
    font-size: 20px;
    margin: 20px;
}

.game {
    width: 520px;
    margin: auto;
    padding: 25px;
    background: #65ad69;

    display: grid;
    grid-template-columns: repeat(3, 1fr);

    gap: 15px;

    border-radius: 20px;
}

.hole {

    height: 130px;

    border: none;

    border-radius: 50%;

    background: #704323;

    font-size: 70px;

    cursor: pointer;

    box-shadow:
    inset 0 12px 5px
    rgba(0,0,0,0.35);

}

.hole:hover {

    background: #805330;

}

#mole {

    background: #ffd45c;

}

#start {

    margin: 30px;

    padding:
    15px 60px;

    font-size: 23px;

    font-weight: bold;

    background: #ffc94f;

    border: none;

    border-radius: 12px;

    cursor: pointer;

}

#start:hover {

    background: #ffb925;

}

</style>

</head>


<body>


<h1>

🐹 もぐらたたきゲーム

</h1>


<div class="info">

<div>

得点：

<span id="score">

0

</span>

点

</div>


<div>

残り時間：

<span id="time">

30

</span>

秒

</div>

</div>


<div id="message">

「ゲーム開始」を押してください

</div>


<div class="game">


<button
class="hole"
onclick="hit(0)">
●
</button>


<button
class="hole"
onclick="hit(1)">
●
</button>


<button
class="hole"
onclick="hit(2)">
●
</button>


<button
class="hole"
onclick="hit(3)">
●
</button>


<button
class="hole"
onclick="hit(4)">
●
</button>


<button
class="hole"
onclick="hit(5)">
●
</button>


<button
class="hole"
onclick="hit(6)">
●
</button>


<button
class="hole"
onclick="hit(7)">
●
</button>


<button
class="hole"
onclick="hit(8)">
●
</button>


</div>


<button
id="start"
onclick="startGame()">

ゲーム開始

</button>


<script>


let score = 0;

let time = 30;

let mole = -1;

let playing = false;

let moleTimer;

let gameTimer;



const holes =

document.querySelectorAll(

".hole"

);



function showMole() {


if (

playing == false

)

return;



holes.forEach(

hole => {

hole.innerHTML = "●";

hole.removeAttribute(

"id"

);

}

);



mole =

Math.floor(

Math.random()*9

);



holes[mole].

innerHTML =

"🐹";



holes[mole].

id =

"mole";



}



function hit(

number

) {


if (

playing == false

)

return;



if (

number == mole

) {


score =

score + 10;



document.

getElementById(

"score"

).

innerHTML =

score;



holes[number].

innerHTML =

"💥";



mole = -1;


}

}



function startGame() {


score = 0;

time = 30;

playing = true;



document.

getElementById(

"score"

).

innerHTML =

0;



document.

getElementById(

"time"

).

innerHTML =

30;



document.

getElementById(

"message"

).

innerHTML =

"もぐらをクリックしてください！";



document.

getElementById(

"start"

).

disabled = true;



showMole();



moleTimer =

setInterval(

showMole,

700

);



gameTimer =

setInterval(

function(){


time--;



document.

getElementById(

"time"

).

innerHTML =

time;



if (

time <= 0

) {


clearInterval(

moleTimer

);



clearInterval(

gameTimer

);



playing = false;



document.

getElementById(

"message"

).

innerHTML =

"ゲーム終了！ 最終得点は "

+ score +

" 点です";



document.

getElementById(

"start"

).

disabled =

false;



holes.forEach(

hole => {

hole.innerHTML =

"●";

});



}


},

1000

);


}


</script>


</body>

</html>
